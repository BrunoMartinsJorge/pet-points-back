<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="pt-br">
<head>
    <meta charset="UTF-8"/>

    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background: #ffffff;
            padding: 20px;
        }

        .carteirinha {
            width: 420px;
            height: 520px;
            border: 1px solid #ddd;
        }

        .lateral {
            width: 40px;
            background-color: #0C6369;
            color: #fff;
            text-align: center;
            vertical-align: middle;
            font-weight: bold;
            font-size: 12px;
            letter-spacing: 2px;
        }

        .titulo-rotacionado {
            writing-mode: vertical-rl;
        }

        .pet-info {
            padding: 10px;
            background: #fafafa;
        }

        .pet-foto {
            text-align: center;
            padding: 10px;
            background: #e9eef0;
        }

        .pet-foto img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .infos {
            margin-top: 10px;
            border: 1px solid #ddd;
            background: #fff;
        }

        .section-title {
            background: #ffffff;
            color: #0C6369;
            font-weight: bold;
            font-size: 11px;
            padding: 4px;
            border-bottom: 1px solid #ddd;
        }

        .data {
            width: 100%;
            border-bottom: 1px dashed #eee;
        }

        .data td {
            padding: 4px 6px;
            font-size: 13px;
        }

        .label {
            font-weight: bold;
            color: #333;
            width: 40%;
        }

        .value {
            color: #666;
        }
    </style>

</head>

<body>

<table class="carteirinha" cellspacing="0" cellpadding="0">

    <tr>
        <!-- LATERAL -->
        <td class="lateral">
            <span class="titulo-rotacionado">
                PET POINTS
            </span>
        </td>

        <!-- CONTEÚDO -->
        <td class="pet-info">

            <!-- FOTO -->
            <div class="pet-foto">
                <img th:if="${imagemBase64 != null}"
                     th:src="'data:image/jpeg;base64,' + ${imagemBase64}"
                     alt="Foto do pet"/>
                <span th:if="${imagemBase64 == null}">Sem imagem</span>
            </div>

            <!-- PET -->
            <table class="infos" width="100%" cellspacing="0" cellpadding="0">

                <tr>
                    <td class="section-title" colspan="2">PET</td>
                </tr>

                <tr class="data">
                    <td class="label">Nome</td>
                    <td class="value" th:text="${pet.nome}"></td>
                </tr>

                <tr class="data">
                    <td class="label">Gênero</td>
                    <td class="value" th:text="${pet.genero}"></td>
                </tr>

                <tr class="data">
                    <td class="label">Tipo</td>
                    <td class="value" th:text="${pet.tipo}"></td>
                </tr>

                <tr class="data">
                    <td class="label">Raça</td>
                    <td class="value" th:text="${pet.raca}"></td>
                </tr>

            </table>

            <!-- TUTOR -->
            <table class="infos" width="100%" cellspacing="0" cellpadding="0" style="margin-top:10px;">

                <tr>
                    <td class="section-title" colspan="2">TUTOR</td>
                </tr>

                <tr class="data">
                    <td class="label">Nome</td>
                    <td class="value" th:text="${pet.nomeTutor}"></td>
                </tr>

                <tr class="data">
                    <td class="label">Gênero</td>
                    <td class="value" th:text="${pet.generoTutor}"></td>
                </tr>

                <tr class="data">
                    <td class="label">Telefone</td>
                    <td class="value" th:text="${pet.telefoneTutor}"></td>
                </tr>

                <tr class="data">
                    <td class="label">Email</td>
                    <td class="value" th:text="${pet.emailTutor}"></td>
                </tr>

                <tr class="data">
                    <td class="label">CPF</td>
                    <td class="value" th:text="${pet.cpfTutor}"></td>
                </tr>

            </table>

        </td>
    </tr>

</table>

</body>
</html>
