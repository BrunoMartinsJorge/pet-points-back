<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            font-size: 12px;
            color: #333;
            margin: 40px;
        }

        .header {
            border-bottom: 2px solid #4CAF50;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        h1 {
            margin: 0;
            font-size: 22px;
            color: #4CAF50;
        }

        .info {
            margin-top: 5px;
            font-size: 11px;
            color: #666;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background-color: #4CAF50;
            color: white;
            text-align: left;
            padding: 8px;
            font-weight: 600;
        }

        td {
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        tr.abaixo {
            background-color: #ffcccc;
        }

        .tipo{
            color: #4CAF50;
            font-weight: bold;
        }

        .footer {
            margin-top: 30px;
            font-size: 10px;
            text-align: right;
            color: #999;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Relatório de Produtos em Estoque</h1>
    <div class="info">
        Gerado em: <span th:text="${dataGeracao}"></span>
    </div>
</div>

<table>
    <thead>
    <tr>
        <th style="width: 15%">Tipo</th>
        <th style="width: 25%">Nome</th>
        <th style="width: 35%">Descrição</th>
        <th style="width: 5%">Valor Unitário</th>
        <th style="width: 15%">Quantidade em Estoque</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="produto : ${produtos}"
        th:classappend="${produto.abaixoEstoque} ? 'abaixo' : ''">

        <td th:text="${produto.tipo}" class="tipo">
        </td>

        <td th:text="${produto.nome}"></td>
        <td th:text="${produto.descricao}"></td>
        <td th:text="${produto.valorUnitario}"></td>
        <td th:text="${produto.quantidadeEstoque} + ' Unidades'"></td>
    </tr>
    </tbody>
</table>

<div class="footer">
    Sistema de Relatórios • Documento gerado automaticamente
</div>

</body>
</html>
